name: Build & Release APK

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.2'
          channel: stable

      - name: Decode google-services.json
        run: echo "${{ secrets.GOOGLE_SERVICES_JSON }}" | base64 -d > mobile/android/app/google-services.json

      - name: Install dependencies
        working-directory: mobile
        run: flutter pub get

      - name: Build release APK
        working-directory: mobile
        run: flutter build apk --release --build-number=${{ github.run_number }}

      - name: Get version
        id: version
        run: |
          BASE=$(grep 'version:' mobile/pubspec.yaml | head -1 | awk '{print $2}' | cut -d'+' -f1)
          MAJOR=$(echo $BASE | cut -d'.' -f1)
          MINOR=$(echo $BASE | cut -d'.' -f2)
          PATCH=${{ github.run_number }}
          echo "tag=v${MAJOR}.${MINOR}.${PATCH}" >> "$GITHUB_OUTPUT"
          echo "name=Maplewood v${MAJOR}.${MINOR}.${PATCH}" >> "$GITHUB_OUTPUT"

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: ${{ steps.version.outputs.name }}
          files: mobile/build/app/outputs/flutter-apk/app-release.apk
          generate_release_notes: true
